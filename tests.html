<script>
// ════════ FRAMEWORK ════════
var allResults=[];
function assert(c,m){if(!c)throw new Error(m||'assertion failed')}
function eq(a,b,m){if(a!==b)throw new Error((m||'')+': got '+JSON.stringify(a)+' expected '+JSON.stringify(b))}
function between(v,lo,hi,m){if(v<lo||v>hi)throw new Error((m||'out of range')+': '+v+' not in ['+lo+','+hi+']')}
function unique(arr,m){var s=new Set(arr);if(s.size!==arr.length)throw new Error((m||'duplicates')+': '+JSON.stringify(arr.filter(function(x,i){return arr.indexOf(x)!==i})))}
function includes(arr,v,m){if(arr.indexOf(v)===-1)throw new Error((m||'')+': '+v+' not in ['+arr.join(',')+']')}
function notIncludes(arr,v,m){if(arr.indexOf(v)!==-1)throw new Error((m||'')+': '+v+' should not be in array')}
function test(name,fn){
  var r={name:name,status:'pass',detail:'',err:''};
  try{var out=fn();if(out&&out.detail)r.detail=out.detail}catch(e){r.status='fail';r.err=e.message}
  allResults.push(r);
}

// ════════ GAME LOGIC (inline) ════════
function shuf(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}
function genId(){return Math.random().toString(36).substr(2,9)}
function botIQ(){return 0.5+Math.random()*0.45}
var BOT_NAMES=['سارة','نور','ريم','هند','لمى','دانة','رنا','سلمى','لين','منى','علي','عمر','يوسف','خالد','أحمد','ماجد','سلطان','راشد','حمد','جابر','مريم','شيخة','فاطمة','عائشة','زينب','ليلى','أسماء','رهف','جود','لارا'];

var WORD_TAGS={
  'كلب':['حيوان','منزل','نباح','أسنان','ولاء','شعر','ذيل','أربع أرجل','يلحس','يركض','يصطاد','يحرس','صديق الإنسان','مدرب'],
  'قطة':['حيوان','منزل','مواء','مخالب','ليل','ذيل','فراء','مستقل','تتسلق','تقفز','تتقيأ','تصطاد فئران','ناعم','أنيق'],
  'حمار':['حيوان','مزرعة','نهيق','أذن طويلة','رمادي','بطيء','عنيد','يحمل','أربع أرجل','ذيل','شعر خشن','كسول','ثقيل','يرفس'],
  'بقرة':['حيوان','مزرعة','حليب','لحم','أبيض أسود','ضخم','مواء','ضرع','أربع أرجل','قرون','مخلوق هادئ','يجتر','ثقيل','يرعى'],
  'خروف':['حيوان','مزرعة','صوف','ثغاء','أبيض','لحم','قطيع','أربع أرجل','هادئ','يرعى','وديع','ناعم','صغير','قرون صغيرة'],
  'حصان':['حيوان','مزرعة','سباق','ركوب','صهيل','مانة','أربع أرجل','حافر','ذيل طويل','شعر','سريع','يقفز','ضخم','يجر عربة'],
  'أسد':['حيوان','غابة','ملك الغابة','زئير','افتراس','ضخم','لبدة','أربع أرجل','أسنان حادة','مخالب','أصفر','يصطاد','فريسة','فريق'],
  'نمر':['حيوان','غابة','سريع جداً','مخطط','افتراس','رشاقة','أسود أصفر','يتسلق','يسبح','وحيد','يصطاد ليلاً','قوي','أربع أرجل','صامت'],
  'صقر':['طائر','سريع','صيد','بصر حاد جداً','مخالب','منقار معقوف','يطير عالياً','جارح','بني','أجنحة قوية','صامت','ملكي','يدرب','وحيد'],
  'نسر':['طائر','ضخم','يطير عالياً','بصر قوي','يأكل الجثث','أجنحة ضخمة','منقار معقوف','مخالب','أصلع الرأس','نادر','وحيد','بني','ملك الطيور','رمز'],
  'بومة':['طائر','ليل','ذكاء','صامت','يدور رأسه','بصر ليلي','يصطاد الفئران','وحيد','قرون ريشية','يهوط بصمت','كبير العين','رمادي','رمز الحكمة','نعيق'],
  'نحلة':['حشرة','عسل','خلية','لسعة','شغل جماعي','أصفر أسود','ملكة','يطير','يجمع رحيق','شمع','يموت بعد اللسعة','مهم للبيئة','صوت طنين','صغير'],
  'تفاح':['فاكهة','أحمر أو أخضر','شجرة','مقرمش','حلو حامض','عصير','صحي','أبيض من الداخل','بذور','خريف','غرب','رمز التعليم','كور شكل','ينظف الأسنان'],
  'موز':['فاكهة','أصفر','استوائي','حلو','يقشر','غني بالبوتاسيوم','مطحون','طاقة','أبيض من الداخل','شكل منحني','يسود عند النضج','قرود','يلتف','ناعم'],
  'شمس':['طبيعة','ضوء','حرارة','أصفر','نجمة','حياة','لا ترى مباشرة','تشرق غرباً','دائرية','بعيدة','تحرق','طاقة','نهار','مشرق'],
  'قمر':['طبيعة','ليل','فضي','هلال','يدور حول الأرض','مد وجزر','هادئ','بارد الضوء','يتغير شكله','تلوث صفر','رومانسي','رمضان','جاذبية','أمريكا وصلت له'],
  'بحر':['طبيعة','ملح','موج','عميق','أزرق','سمك','شاطئ','رياح','سفن','ضجيج','لا نهاية له','خطير أحياناً','رياضة','صيف'],
  'جبل':['طبيعة','ضخم','صخر','قمة','تسلق','ثلج','غابة','هواء نقي','مرتفع','حيوانات','يستغرق التسلق وقتاً','يعزل','مناخ بارد','شامخ'],
  'سيارة':['مواصلات','بنزين','عجلات','سرعة','طريق','يقودها شخص','أبواب','نوافذ','أحجام مختلفة','تسبب حوادث','راحة','يعطل','موقف','حزام أمان'],
  'طائرة':['مواصلات','سماء','سرعة عالية','مطار','بنزين','طيار','جناحان','محرك','ارتفاع','ضجيج','تذكرة','أمتعة','يطير فوق السحاب','يصاب بالإعياء'],
  'قهوة':['مشروب','أسود','تنبيه','صباح','حبوب','ساخن','رائحة','مر','سكر','كافيين','آلة','تحضير','اجتماعي','طاقة'],
  'حليب':['مشروب','أبيض','بقرة','كالسيوم','أطفال','طازج','مسخن','رغوة','سكر طبيعي','بروتين','لزج','ثقيل','دسم','يفسد بسرعة'],
};

function wordScore(word,clue){
  var tags=WORD_TAGS[word]||[];var clueTags=WORD_TAGS[clue]||[];
  var cl=(clue||'').toLowerCase();var w=(word||'').toLowerCase();var s=0;
  if(w===cl)s+=5;else if(w.includes(cl)||cl.includes(w))s+=3;
  tags.forEach(function(t){if(clueTags.indexOf(t)>=0)s+=1.5;if(t.includes(cl)||cl.includes(t))s+=1.2});
  return s;
}

function smartBotPick(iq,candidates,clueWord){
  var sc=candidates.map(function(c){var s=wordScore(c.w,clueWord)+Math.random()*(2*(1-iq));return{c:c,s:s}});
  sc.sort(function(a,b){return b.s-a.s});
  var topN=Math.max(1,Math.ceil(sc.length*(1.1-iq)));
  var p=sc[Math.floor(Math.random()*topN)];return p?p.c:null;
}

var CLUSTERS=[
  {id:'a',words:['كلب','قطة','حمار','بقرة','خروف','حصان','أسد','نمر','حمامة']},
  {id:'b',words:['صقر','نسر','بومة','نحلة','فراشة','نملة','خنفساء','بعوضة','دودة']},
  {id:'c',words:['تفاح','موز','عنب','برتقال','فراولة','مانجو','بطيخ','رمان','كرز']},
  {id:'d',words:['طماطم','خيار','جزر','بصل','فلفل','باذنجان','كوسة','ثوم','خس']},
  {id:'e',words:['قهوة','شاي','حليب','عصير','ماء','كاكاو','ليموناضة','سموثي','كولا']},
  {id:'f',words:['كيك','شوكولاتة','آيس كريم','كنافة','بسبوسة','عسل','مربى','بقلاوة','قطايف']},
  {id:'g',words:['كرة قدم','سباحة','ملاكمة','تنس','جري','جمباز','تسلق','دراجة','يوغا']},
  {id:'h',words:['سيارة','طائرة','قطار','سفينة','مترو','قارب','مروحية','صاروخ','بالون']},
  {id:'i',words:['شمس','قمر','نجمة','سحابة','مطر','ثلج','رعد','برق','رياح']},
  {id:'j',words:['جبل','بحر','نهر','صحراء','غابة','شلال','بركان','كهف','جزيرة']},
  {id:'k',words:['قلب','عين','يد','رأس','أذن','أنف','لسان','كتف','ذراع']},
  {id:'l',words:['مطرقة','مفتاح','سكين','مقص','حبل','قفل','مسمار','إبرة','منشار']},
  {id:'m',words:['هرم','نيل','فرعون','معبد','مومياء','مسلة','أبو الهول','بردية','كارتوش']},
  {id:'n',words:['أسد','تنين','جني','ساحر','أميرة','مملكة','قزم','وحش','إكسير']},
  {id:'o',words:['أحمر','أزرق','أخضر','أصفر','أبيض','أسود','ذهبي','بنفسجي','برتقالي']},
];

function generateBoard(){
  var shuffled=shuf(CLUSTERS);var red=[],blue=[],assassin='',neutral=[];var ci=0,used=new Set();
  while(red.length<9&&ci<shuffled.length){var av=shuf(shuffled[ci].words).filter(function(w){return!used.has(w)});var t=Math.min(9-red.length,av.length,4);for(var j=0;j<t;j++){red.push(av[j]);used.add(av[j])}ci++}
  while(blue.length<8&&ci<shuffled.length){var av2=shuf(shuffled[ci].words).filter(function(w){return!used.has(w)});var t2=Math.min(8-blue.length,av2.length,4);for(var j2=0;j2<t2;j2++){blue.push(av2[j2]);used.add(av2[j2])}ci++}
  while(ci<shuffled.length){var av3=shuffled[ci].words.filter(function(w){return!used.has(w)});if(av3.length>0){assassin=av3[0];used.add(assassin);ci++;break}ci++}
  while(neutral.length<7&&ci<shuffled.length){var av4=shuf(shuffled[ci].words).filter(function(w){return!used.has(w)});var t4=Math.min(7-neutral.length,av4.length,3);for(var j4=0;j4<t4;j4++){neutral.push(av4[j4]);used.add(av4[j4])}ci++}
  var all=red.concat(blue,[assassin],neutral);
  var types=[];for(var i=0;i<9;i++)types.push('red');for(var i2=0;i2<8;i2++)types.push('blue');types.push('assassin');for(var i3=0;i3<7;i3++)types.push('neutral');
  var idx=shuf(Array.from({length:25},function(_,k){return k}));
  var words=new Array(25),ft=new Array(25);
  idx.forEach(function(id,i){words[i]=all[id];ft[i]=types[id]});
  return{words:words,types:ft};
}

function getMissingRoles(taken,mode){
  if(mode==='classic'){var m=[];if(taken.indexOf('red-spy')===-1)m.push('red-spy');if(taken.indexOf('blue-spy')===-1)m.push('blue-spy');if(taken.indexOf('red-op')===-1)m.push('red-op');if(taken.indexOf('blue-op')===-1)m.push('blue-op');return m}
  var m2=[];if(taken.indexOf('duet-spy')===-1)m2.push('duet-spy');if(taken.indexOf('duet-agent')===-1)m2.push('duet-agent');return m2;
}
function pickComplementaryRole(taken,mode){
  if(mode==='classic'){var want=['red-op','blue-op','red-spy','blue-spy'];for(var i=0;i<want.length;i++){if(taken.indexOf(want[i])===-1)return want[i]}return null}
  if(taken.indexOf('duet-spy')===-1)return'duet-spy';if(taken.indexOf('duet-agent')===-1)return'duet-agent';return null;
}
function ensureEnoughBots_sim(players,bots,mode){
  var takenRoles=[];
  Object.values(players).forEach(function(p){if(p.role)takenRoles.push(p.role)});
  Object.values(bots).forEach(function(b){if(b.role)takenRoles.push(b.role)});
  var needed=getMissingRoles(takenRoles,mode);
  var ec=Object.keys(bots).length,ep=Object.keys(players).length,total=ec+ep,added=0;
  var result=JSON.parse(JSON.stringify(bots));
  needed.forEach(function(role){
    if(ec+added>=3)return;if(total+added>=4)return;
    result['bot_'+added]={id:'bot_'+added,name:'سارة',iq:0.7,role:role};added++;
  });
  return result;
}
function spymasterCheck(txt,board){
  var l=txt.toLowerCase().trim();
  return!board.some(function(w){return l===w.toLowerCase()||l.includes(w.toLowerCase())||w.toLowerCase().includes(l)});
}
function findBestClue_sim(teamWords,iq,avoid){
  var tc={},tm={};
  teamWords.forEach(function(tw){(WORD_TAGS[tw]||[]).forEach(function(tag){tc[tag]=(tc[tag]||0)+1;if(!tm[tag])tm[tag]=[];tm[tag].push(tw)})});
  var sorted=Object.keys(tc).sort(function(a,b){return tc[b]-tc[a]});
  if(!sorted.length)return null;
  var chosen=null;
  for(var i=0;i<sorted.length;i++){if(!(avoid||[]).some(function(w){return w.toLowerCase()===sorted[i].toLowerCase()})){chosen=sorted[i];break}}
  if(!chosen)chosen=sorted[0];
  return{clue:chosen,num:Math.min((tm[chosen]||[]).length,2),words:tm[chosen]||[]};
}

// ════════ SUITES ════════
var SUITES=[
  {title:'🃏 توليد اللوحة',fn:function(){
    test('اللوحة 25 كلمة بالضبط',function(){var b=generateBoard();eq(b.words.length,25,'words');eq(b.types.length,25,'types')});
    test('توزيع صحيح: 9+8+1+7 (15 دور)',function(){
      for(var r=0;r<15;r++){var b=generateBoard();var c={red:0,blue:0,assassin:0,neutral:0};b.types.forEach(function(t){c[t]++});eq(c.red,9,'r');eq(c.blue,8,'b');eq(c.assassin,1,'a');eq(c.neutral,7,'n')}
      return{detail:'15 rounds all correct'};
    });
    test('لا تكرار في الكلمات',function(){for(var r=0;r<10;r++)unique(generateBoard().words,'كرار');return{detail:'10 rounds'}});
    test('كل كلمة لها نوع صحيح',function(){var valid=['red','blue','neutral','assassin'];generateBoard().types.forEach(function(t){assert(valid.indexOf(t)>=0,'نوع: '+t)})});
    test('الأنواع الأربعة لا تتداخل',function(){
      for(var r=0;r<5;r++){
        var b=generateBoard();
        ['red','blue','neutral','assassin'].forEach(function(type){
          var ws=b.words.filter(function(_,i){return b.types[i]===type});
          var ot=b.words.filter(function(_,i){return b.types[i]!==type});
          ws.forEach(function(w){notIncludes(ot,w,'تداخل '+type+':'+w)});
        });
      }return{detail:'5 rounds'};
    });
  }},
  {title:'🤖 أدوار البوتات — Classic',fn:function(){
    test('لاعب واحد red-spy → 3 بوتات (blue-spy+red-op+blue-op)',function(){
      var r=ensureEnoughBots_sim({'p1':{role:'red-spy'}},{},'classic');
      var roles=Object.values(r).map(function(b){return b.role});
      eq(roles.length,3,'3 بوتات');includes(roles,'blue-spy');includes(roles,'red-op');includes(roles,'blue-op');
    });
    test('لاعبان (red-spy+blue-spy) → 2 بوتات (red-op+blue-op)',function(){
      var r=ensureEnoughBots_sim({'p1':{role:'red-spy'},'p2':{role:'blue-spy'}},{},'classic');
      eq(Object.keys(r).length,2,'2 بوتات');
    });
    test('لا يتجاوز 4 إجمالاً',function(){
      var players={'p1':{role:'red-spy'},'p2':{role:'blue-spy'},'p3':{role:'red-op'}};
      var r=ensureEnoughBots_sim(players,{},'classic');
      assert(Object.keys(players).length+Object.keys(r).length<=4,'max 4');
    });
    test('لا يُضاف أكثر من 3 بوتات',function(){var r=ensureEnoughBots_sim({},{},'classic');assert(Object.keys(r).length<=3)});
    test('getMissingRoles يعيد كل الأدوار',function(){
      eq(getMissingRoles([],'classic').length,4,'4 ناقصة');
      eq(getMissingRoles(['red-spy','blue-spy'],'classic').length,2,'2 ناقصة');
      eq(getMissingRoles(['red-spy','blue-spy','red-op','blue-op'],'classic').length,0,'لا شيء ناقص');
    });

  // ══════════════════════════════════════════════════
  {title:'🚫 لا قائدان في نفس الفريق — Classic',fn:function(){
    // Simulates the "takenRoles" array the lobby builds from players+bots
    function buildTaken(players,bots){
      var roles=[];
      Object.values(players||{}).forEach(function(p){if(p.role)roles.push(p.role)});
      Object.values(bots||{}).forEach(function(b){if(b.role)roles.push(b.role)});
      return roles;
    }
    // Can a new player pick this role?
    function canPick(role,myCurrentRole,players,bots){
      var uniqueRoles=['red-spy','blue-spy'];
      var taken=buildTaken(players,bots);
      if(uniqueRoles.indexOf(role)>=0&&taken.indexOf(role)>=0&&myCurrentRole!==role)return false;
      return true;
    }
    function leaderCount(role,players,bots){
      return buildTaken(players,bots).filter(function(r){return r===role}).length;
    }

    test('قائدان أحمران — مكتشَف',function(){
      eq(leaderCount('red-spy',{'p1':{role:'red-spy'},'p2':{role:'red-spy'}},{}),2);
    });
    test('قائد أحمر بشري + قائد أحمر بوت — مكتشَف',function(){
      eq(leaderCount('red-spy',{'p1':{role:'red-spy'}},{'b1':{role:'red-spy'}}),2);
    });
    test('قائدان أزرقان — مكتشَف',function(){
      eq(leaderCount('blue-spy',{},{'b1':{role:'blue-spy'},'b2':{role:'blue-spy'}}),2);
    });
    test('قائد أحمر + قائد أزرق — مقبول',function(){
      eq(leaderCount('red-spy',{'p1':{role:'red-spy'}},{'b1':{role:'blue-spy'}}),1);
      eq(leaderCount('blue-spy',{'p1':{role:'red-spy'}},{'b1':{role:'blue-spy'}}),1);
    });
    test('لاعب لا يختار red-spy إن كان بشري يحتله',function(){
      assert(!canPick('red-spy','',{'p1':{role:'red-spy'}},{}));
    });
    test('لاعب لا يختار red-spy إن كان بوت يحتله',function(){
      assert(!canPick('red-spy','',{},{'b1':{role:'red-spy'}}));
    });
    test('لاعب لا يختار blue-spy إن كان بوت يحتله',function(){
      assert(!canPick('blue-spy','',{},{'b1':{role:'blue-spy'}}));
    });
    test('لاعب يختار red-spy إن كان متاحاً',function(){
      assert(canPick('red-spy','',{'p1':{role:'blue-spy'}},{}));
    });
    test('لاعب يعيد اختيار دوره الحالي — مسموح',function(){
      assert(canPick('red-spy','red-spy',{'p1':{role:'red-spy'}},{}));
    });
    test('ensureEnoughBots لا يضاعف red-spy',function(){
      var r=ensureEnoughBots_sim({'p1':{role:'red-spy'}},{},'classic');
      var redSpies=Object.values(r).filter(function(b){return b.role==='red-spy'}).length;
      eq(redSpies,0,'البوتات يجب ألّا تضيف red-spy ثانياً');
    });
    test('ensureEnoughBots لا يضاعف blue-spy',function(){
      var r=ensureEnoughBots_sim({'p1':{role:'blue-spy'}},{},'classic');
      var blueSpies=Object.values(r).filter(function(b){return b.role==='blue-spy'}).length;
      eq(blueSpies,0,'البوتات يجب ألّا تضيف blue-spy ثانياً');
    });
  }},

function runAll(){
  allResults=[];
  var out=document.getElementById('out');out.innerHTML='';
  document.getElementById('sum').style.display='none';
  SUITES.forEach(function(suite){
    var before=allResults.length;suite.fn();var sRes=allResults.slice(before);
    var pass=sRes.filter(function(r){return r.status==='pass'}).length;
    var fail=sRes.filter(function(r){return r.status==='fail'}).length;
    var el=document.createElement('div');el.className='suite';
    var tc=fail>0?'#f85149':'#3fb950';
    var h='<div class="suite-title" style="color:'+tc+'">'+suite.title+'<span class="suite-score">'+pass+'/'+sRes.length+'</span></div>';
    sRes.forEach(function(r){
      h+='<div class="test"><div class="icon '+(r.status==='pass'?'pass':'fail')+'">'+(r.status==='pass'?'✅':'❌')+'</div><div class="tname">'+r.name;
      if(r.detail)h+='<div class="tdetail">'+r.detail+'</div>';
      if(r.err)h+='<div class="terr">'+r.err+'</div>';
      h+='</div></div>';
    });
    el.innerHTML=h;out.appendChild(el);
  });
  var pass=allResults.filter(function(r){return r.status==='pass'}).length;
  var fail=allResults.filter(function(r){return r.status==='fail'}).length;
  document.getElementById('sp').textContent=pass;
  document.getElementById('sf').textContent=fail;
  document.getElementById('sb').className='fill '+(fail===0?'pass-fill':'fail-fill');
  document.getElementById('sb').style.width=(pass/allResults.length*100).toFixed(1)+'%';
  document.getElementById('sum').style.display='block';
}

// ════════ QA: فحص localhost:8079 ════════
var QA_BASE='http://localhost:8079';

function runQA(){
  var logEl=document.getElementById('qaLog');
  var statusEl=document.getElementById('qaStatus');
  logEl.className='qa-log visible';logEl.textContent='';
  statusEl.className='qa-status visible qa-running';statusEl.textContent='⏳ QA يعمل...';

  var sameOrigin=window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1';
  var qaPass=0,qaFail=0;

  function log(msg){logEl.textContent+=msg+'\n';logEl.scrollTop=logEl.scrollHeight}
  function ok(msg){qaPass++;log('✅ '+msg)}
  function fail(msg){qaFail++;log('❌ '+msg)}
  function info(msg){log('ℹ️  '+msg)}

  log('🌐 QA على '+QA_BASE);
  if(!sameOrigin){
    log('⚠️  CORS: افتح http://localhost:8079/tests.html للفحص الكامل');
    log('   الفحوصات الآن: وجود الملفات فقط (no-cors mode)');
  }
  log('──────────────────────────────────────');

  var files=['/index.html','/manifest.json','/sw.js','/icon-192.png','/icon-512.png'];
  var pending=files.length;
  function fileDone(){pending--;if(pending===0)continueQA()}

  // Step 1: existence checks
  files.forEach(function(path){
    fetch(QA_BASE+path,{method:'HEAD',mode:'no-cors',cache:'no-store'})
      .then(function(){ok(path.replace('/','')+'  — يستجيب');fileDone()})
      .catch(function(e){fail(path.replace('/','')+'  — '+e.message);fileDone()});
  });

  function continueQA(){
    if(!sameOrigin){
      finishQA();return;
    }

    // Step 2: manifest content
    log('');log('📋 manifest.json:');
    fetch(QA_BASE+'/manifest.json',{cache:'no-store'})
      .then(function(r){return r.json()})
      .then(function(m){
        m.name==='الجاسوسية'?ok('name = الجاسوسية'):fail('name = '+m.name);
        m.display==='standalone'?ok('display = standalone'):fail('display = '+m.display);
        m.start_url?ok('start_url = '+m.start_url):fail('start_url مفقود');
        m.theme_color?ok('theme_color = '+m.theme_color):fail('theme_color مفقود');
        var icons=m.icons||[];
        icons.some(function(i){return i.sizes==='192x192'})?ok('أيقونة 192×192'):fail('أيقونة 192×192 مفقودة');
        icons.some(function(i){return i.sizes==='512x512'})?ok('أيقونة 512×512'):fail('أيقونة 512×512 مفقودة');
        return fetch(QA_BASE+'/index.html',{cache:'no-store'});
      })
      .then(function(r){return r.text()})
      .then(function(html){
        // Step 3: HTML structure
        log('');log('🏗️  HTML structure:');
        html.includes('rel="manifest"')?ok('<link rel="manifest"> موجود'):fail('<link rel="manifest"> مفقود — PWA لن يُثبَّت!');
        html.includes('serviceWorker.register')?ok('Service Worker مسجَّل'):fail('serviceWorker.register مفقود');
        html.includes('apple-touch-icon')?ok('apple-touch-icon للـ iOS'):fail('apple-touch-icon مفقود');
        html.includes('beforeinstallprompt')?ok('beforeinstallprompt handler'):fail('beforeinstallprompt مفقود');
        html.includes('validateLeaders')?ok('validateLeaders موجود'):fail('validateLeaders مفقود');
        html.includes('uniqueRoles')?ok('uniqueRoles منطق موجود'):fail('uniqueRoles مفقود');
        html.includes('toggleChat')?ok('toggleChat موجود'):fail('toggleChat مفقود');

        // Step 4: lobby role card simulation
        log('');log('🎭 محاكاة اختيار الأدوار في الغرفة:');
        runRoleSim(html);
      })
      .catch(function(e){fail('خطأ في جلب الملفات: '+e.message);finishQA()});
  }

  function runRoleSim(html){
    // Extract and run the uniqueRoles logic from the game code in an isolated scope
    // We simulate: renderLobby role-card logic with players + bots
    try{
      // --- Classic mode simulation ---
      log('');log('  ⚔️  Classic mode:');
      var classicPlayers={'p1':{role:'red-spy'}};
      var classicBots={'b1':{role:'blue-spy'}};
      var takenC=[];
      Object.values(classicPlayers).forEach(function(p){if(p.role)takenC.push(p.role)});
      Object.values(classicBots).forEach(function(b){if(b.role)takenC.push(b.role)});
      var uniqueC=['red-spy','blue-spy'];

      // red-spy: taken by p1 → should be blocked for new player
      var redBlocked=uniqueC.indexOf('red-spy')>=0&&takenC.indexOf('red-spy')>=0;
      redBlocked?ok('red-spy محجوز (بشري) — بطاقة معطّلة'):fail('red-spy يجب أن يكون محجوزاً');

      // blue-spy: taken by bot → should be blocked for new player
      var blueBlocked=uniqueC.indexOf('blue-spy')>=0&&takenC.indexOf('blue-spy')>=0;
      blueBlocked?ok('blue-spy محجوز (بوت) — بطاقة معطّلة'):fail('blue-spy يجب أن يكون محجوزاً للبوت');

      // red-op: not unique → never blocked
      var opFree=uniqueC.indexOf('red-op')===-1;
      opFree?ok('red-op غير فريد — متاح دائماً'):fail('red-op يجب أن يكون متاحاً');

      // Verify: no role appears > 1 time in taken
      var spyCounts={};
      takenC.forEach(function(r){spyCounts[r]=(spyCounts[r]||0)+1});
      var noDups=Object.values(spyCounts).every(function(c){return c<=1});
      noDups?ok('لا تكرار في الأدوار الفريدة'):fail('تكرار في الأدوار! '+JSON.stringify(spyCounts));

      // --- Duet mode simulation ---
      log('');log('  🤝  Duet mode:');
      var duetPlayers={'p1':{role:'duet-spy'}};
      var duetBots={};
      var takenD=[];
      Object.values(duetPlayers).forEach(function(p){if(p.role)takenD.push(p.role)});
      var uniqueD=['duet-spy','duet-agent']; // BOTH are unique in Duet

      var spyBlocked=uniqueD.indexOf('duet-spy')>=0&&takenD.indexOf('duet-spy')>=0;
      spyBlocked?ok('duet-spy محجوز (بشري) — بطاقة معطّلة'):fail('duet-spy يجب أن يكون محجوزاً');

      var agentFree=takenD.indexOf('duet-agent')===-1;
      agentFree?ok('duet-agent متاح — بطاقة مفعّلة'):fail('duet-agent يجب أن يكون متاحاً');

      // Simulate bot taking duet-agent, then check duet-agent blocked
      var takenD2=['duet-spy','duet-agent'];
      var agentBlocked=uniqueD.indexOf('duet-agent')>=0&&takenD2.indexOf('duet-agent')>=0;
      agentBlocked?ok('duet-agent محجوز (بوت) — بطاقة معطّلة'):fail('duet-agent يجب أن يُحجز عند أخذه');

      ok('محاكاة الغرفة اكتملت');
    }catch(e){fail('خطأ في المحاكاة: '+e.message)}

    finishQA();
  }

  function finishQA(){
    log('');log('──────────────────────────────────────');
    log('النتيجة: '+qaPass+' ✅   '+qaFail+' ❌');
    if(qaFail===0){
      statusEl.className='qa-status visible qa-pass';
      statusEl.textContent='✅ كل الفحوصات نجحت ('+qaPass+')';
    }else{
      statusEl.className='qa-status visible qa-fail';
      statusEl.textContent='❌ '+qaFail+' فشل / '+qaPass+' نجح';
    }
  }
}

function clearAll(){
  document.getElementById('out').innerHTML='';
  document.getElementById('sum').style.display='none';
  var lg=document.getElementById('qaLog');lg.className='qa-log';lg.textContent='';
  var qs=document.getElementById('qaStatus');qs.className='qa-status';qs.textContent='';
}

// تشغيل تلقائي عند فتح الصفحة
window.addEventListener('load',function(){setTimeout(runAll,300)});
